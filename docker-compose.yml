services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-clean-hexapp
    working_dir: /app
    ports:
      - "8080:8080"
    depends_on:
      - db
    env_file:
      - .env
    command: ./go-clean-hexapp
  db:
    image: postgres:16
    container_name: clean-hexapp-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  db-data:
